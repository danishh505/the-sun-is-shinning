name: Ekstrak dan Simpan Permanen ke GitHub
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  extract_and_commit:
    runs-on: windows-latest

    steps:
    - name: Ambil Code dari Repositori
      uses: actions/checkout@v4

    - name: Mengekstrak redsun.zip
      run: |
        Expand-Archive -Path redsun.zip -DestinationPath . -Force

    - name: Simpan Hasil Ekstrak ke GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Automated: Hasil ekstrak dari redsun.zip"
        git push
